schema: "paperclip/v1"
agents:
  api-testing-agent:
    role: "engineer"
    icon: "search"
    capabilities: "Process 2 — Understands tasks, maps API flows, sets up test data, runs happy/negative/edge/idempotency tests via Postman, validates requests and responses, detects functional/logical/data/silent issues, checks for blockers, reports bugs with severity and steps, and determines Cypress automation readiness."
    adapter:
      config:
        dangerouslySkipPermissions: true
        graceSec: 20
        model: "litellm/kimi-latest"
      type: "opencode_local"
    inputs:
      env:
        PAPERCLIP_BASE_URL:
          description: "Fully-qualified Paperclip control-plane base URL this agent reports to (e.g. `http://localhost:3100` for local — local Paperclip listens on port 3100; or `https://paperclip.example.com` for a hosted instance — use `https://` for any non-localhost host). Used in every POST/PATCH/GET/PUT against `${PAPERCLIP_BASE_URL}/api/...`."
          kind: "string"
          default: "http://localhost:3100"
          requirement: "required"
        HYPERSWITCH_REPO_PATH:
          description: "Absolute path to the local Hyperswitch git checkout the agent operates against (e.g. `/workspace/hyperswitch` in the hosted runner, or `/Users/<you>/code/hyperswitch` when running on your laptop). Worktrees for parallel pipelines are created inside this directory: `${HYPERSWITCH_REPO_PATH}/cypress-tests-<issue-identifier>`."
          kind: "string"
          default: "/workspace/hyperswitch"
          requirement: "required"
        CYPRESS_CONNECTOR_AUTH_FILE_PATH:
          description: "Absolute path to the Cypress connector credentials file (`creds.json`). Defaults to `/workspace/creds.json` in the hosted runner — override when running locally if the file lives elsewhere. Same env name Cypress consumes at runtime."
          kind: "string"
          default: "/workspace/creds.json"
          requirement: "required"
        CYPRESS_BASEURL:
          description: "Fully-qualified base URL of the Hyperswitch router under test (e.g. `http://hyperswitch-hyperswitch-server-1:8080` in the hosted compose stack, or `http://localhost:8080` when running the router locally). Distinct from `$PAPERCLIP_BASE_URL` (the Paperclip control plane) — never confuse the two."
          kind: "string"
          default: "http://hyperswitch-hyperswitch-server-1:8080"
          requirement: "required"
  cypress-feasibility-agent:
    role: "engineer"
    icon: "eye"
    capabilities: "Process 3 — Analyses the Cypress repo structure, checks connector config presence, detects duplicate test cases, verifies commands.js functions exist, writes a test plan, and outputs a feasibility verdict table. Only clears for test generation when all checks are PASS or FIXED."
    adapter:
      config:
        dangerouslySkipPermissions: true
        graceSec: 20
        model: "litellm/kimi-latest"
      type: "opencode_local"
    inputs:
      env:
        PAPERCLIP_BASE_URL:
          description: "Fully-qualified Paperclip control-plane base URL this agent reports to (e.g. `http://localhost:3100` for local — local Paperclip listens on port 3100; or `https://paperclip.example.com` for a hosted instance — use `https://` for any non-localhost host). Used in every POST/PATCH/GET/PUT against `${PAPERCLIP_BASE_URL}/api/...`."
          kind: "string"
          default: "http://localhost:3100"
          requirement: "required"
        HYPERSWITCH_REPO_PATH:
          description: "Absolute path to the local Hyperswitch git checkout the agent inspects for repo structure / connector configs / commands.js (e.g. `/workspace/hyperswitch` in the hosted runner, or `/Users/<you>/code/hyperswitch` when running on your laptop). The cypress-tests directory lives at `${HYPERSWITCH_REPO_PATH}/cypress-tests`."
          kind: "string"
          default: "/workspace/hyperswitch"
          requirement: "required"
        CYPRESS_CONNECTOR_AUTH_FILE_PATH:
          description: "Absolute path to the Cypress connector credentials file (`creds.json`) inspected during the connector-creds feasibility check. Defaults to `/workspace/creds.json` in the hosted runner — override when running locally if the file lives elsewhere."
          kind: "string"
          default: "/workspace/creds.json"
          requirement: "required"
  github-agent:
    role: "engineer"
    icon: "git-branch"
    capabilities: "Process 6 — Creates the GitHub issue (following .github/ISSUE\\_TEMPLATE) and PR (following .github/PULL\\_REQUEST\\_TEMPLATE.md) from the parent issue worktree (branch `$BRANCH_PREFIX/QAA-<n>`) after CEO confirms all runner checkpoints pass. Also handles CEO re-dispatches after Test Generation Agent revises the spec for reviewer comments or resolves a merge conflict — commits and pushes the revised worktree to the same branch so the PR auto-updates. Reports PR merge/close state so CEO can clean up the worktree. Sole push authority in the pipeline."
    adapter:
      config:
        dangerouslySkipPermissions: true
        graceSec: 20
        model: "litellm/kimi-latest"
      type: "opencode_local"
    inputs:
      env:
        GITHUB_TOKEN:
          description: "Bot token for GitHub authentication (sourced via `gh auth token`). Owns the create-write surface — used for `gh issue create`, `gh pr create`, `gh pr edit`, and `git push -u origin $BRANCH_PREFIX/QAA-<n>`. Shared with pr-maintenance-agent (which uses it READ-only)."
          kind: "secret"
          default: ""
          requirement: "required"
        BRANCH_PREFIX:
          description: "Company short form used as the branch/worktree namespace (e.g. `qal`). All PR branches are named `$BRANCH_PREFIX/QAA-<n>`. Must match the value set on qa-coverage-agent and pr-maintenance-agent."
          kind: "string"
          default: ""
          requirement: "required"
        PAPERCLIP_BASE_URL:
          description: "Fully-qualified Paperclip control-plane base URL this agent reports to (e.g. `http://localhost:3100` for local — local Paperclip listens on port 3100; or `https://paperclip.example.com` for a hosted instance — use `https://` for any non-localhost host). Distinct from `$GITHUB_TOKEN` — both must be set."
          kind: "string"
          default: "http://localhost:3100"
          requirement: "required"
        HYPERSWITCH_REPO_PATH:
          description: "Absolute path to the local Hyperswitch git checkout the agent operates against — used to locate the per-issue worktree at `${HYPERSWITCH_REPO_PATH}/cypress-tests-<issue-identifier>` for `git push`, `gh pr create`, and post-merge cleanup. Defaults to `/workspace/hyperswitch` (the docker mount point); override to your local checkout if you run the agent outside docker."
          kind: "string"
          default: "/workspace/hyperswitch"
          requirement: "required"
  pr-maintenance-agent:
    role: "engineer"
    icon: "git-merge"
    capabilities: "Routine-driven PR observer — every N minutes sweeps open bot-authored $BRANCH_PREFIX/QAA-* PRs. For each PR whose parent pipeline issue exists on THIS Paperclip instance (two-gate match), relays new reviewer activity, BEHIND/DIRTY state, and merge conflicts to the parent pipeline issue so the QA Coverage Agent is woken to orchestrate the fix. READ-only on GitHub: never creates PRs or issues, never pushes. All resolution work is delegated by the CEO to Test Generation Agent → Runner Agent → GitHub Agent."
    adapter:
      config:
        dangerouslySkipPermissions: true
        graceSec: 20
        model: "litellm/kimi-latest"
      type: "opencode_local"
    inputs:
      env:
        GITHUB_TOKEN:
          description: "Bot token for fetching PR reviews/comments (sourced from `gh auth token`). Shared with github-agent. READ-only scope — this agent never pushes."
          kind: "secret"
          default: ""
          requirement: "required"
        BRANCH_PREFIX:
          description: "Company short form used as the branch/worktree namespace (e.g. `qal`). PR filter becomes `^$BRANCH_PREFIX/QAA-\\d+$`. Must match the value set on qa-coverage-agent and github-agent."
          kind: "string"
          default: ""
          requirement: "required"
        PAPERCLIP_BASE_URL:
          description: "Fully-qualified Paperclip control-plane base URL this agent reports to (e.g. `http://localhost:3100` for local — local Paperclip listens on port 3100; or `https://paperclip.example.com` for a hosted instance — use `https://` for any non-localhost host). Used to POST `REVIEW_UPDATE` / `MAINTENANCE_BLOCKED` comments + create PR-feedback subissues + advance the `pr-poll-cursor` document on the parent."
          kind: "string"
          default: "http://localhost:3100"
          requirement: "required"
  qa-coverage-agent:
    role: "ceo"
    adapter:
      config:
        dangerouslySkipPermissions: true
        graceSec: 20
        model: "litellm/kimi-latest"
      type: "opencode_local"
    runtime:
      heartbeat:
        intervalSec: 300
        maxConcurrentRuns: 1
    permissions:
      canCreateAgents: true
    inputs:
      env:
        BRANCH_PREFIX:
          description: "Company short form used as the branch/worktree namespace (e.g. `qal`). Worktree branches are created as `$BRANCH_PREFIX/QAA-<n>`. Must match the value set on github-agent and pr-maintenance-agent."
          kind: "string"
          default: ""
          requirement: "required"
        PAPERCLIP_BASE_URL:
          description: "Fully-qualified Paperclip control-plane base URL the CEO reports to (e.g. `http://localhost:3100` for local — local Paperclip listens on port 3100; or `https://paperclip.example.com` for a hosted instance — use `https://` for any non-localhost host). Used to read inbox, post comments on parent issues, assign subtasks to specialist agents, and PATCH status."
          kind: "string"
          default: "http://localhost:3100"
          requirement: "required"
        HYPERSWITCH_REPO_PATH:
          description: "Absolute path to the local Hyperswitch git checkout. The CEO uses this to provision per-issue worktrees inside the repo: `${HYPERSWITCH_REPO_PATH}/cypress-tests-<issue-identifier>`. Forwarded to the runner / test-generation / github agents via the parent issue. Defaults to `/workspace/hyperswitch` in the hosted runner; override when running locally."
          kind: "string"
          default: "/workspace/hyperswitch"
          requirement: "required"
        CYPRESS_CONNECTOR_AUTH_FILE_PATH:
          description: "Absolute path to the Cypress connector credentials file (`creds.json`). Forwarded verbatim to the Runner Agent in Step 5 environment variables. Defaults to `/workspace/creds.json` in the hosted runner; override when running locally if the file lives elsewhere."
          kind: "string"
          default: "/workspace/creds.json"
          requirement: "required"
        CYPRESS_BASEURL:
          description: "Fully-qualified base URL of the Hyperswitch router under test, forwarded to the Runner Agent (and used in CEO-issued instructions to API Testing). Defaults to `http://hyperswitch-hyperswitch-server-1:8080` in the hosted compose stack; set to `http://localhost:8080` (or wherever the router listens) when running locally. Distinct from `$PAPERCLIP_BASE_URL` — never confuse the two."
          kind: "string"
          default: "http://hyperswitch-hyperswitch-server-1:8080"
          requirement: "required"
  runner-agent:
    role: "engineer"
    icon: "terminal"
    capabilities: "Process 5 — Verifies the server is running, sets up Cypress environment variables, identifies changed specs, runs prerequisite specs (01-AccountCreate, 02-CustomerCreate, 03-ConnectorCreate) followed by the changed spec, executes per connector, and reports pass/fail results."
    adapter:
      config:
        dangerouslySkipPermissions: true
        graceSec: 20
        model: "litellm/kimi-latest"
      type: "opencode_local"
    inputs:
      env:
        PAPERCLIP_BASE_URL:
          description: "Fully-qualified Paperclip control-plane base URL this agent reports to (e.g. `http://localhost:3100` for local — local Paperclip listens on port 3100; or `https://paperclip.example.com` for a hosted instance — use `https://` for any non-localhost host). Distinct from `$CYPRESS_BASEURL` (the Hyperswitch router under test) — never confuse the two."
          kind: "string"
          default: "http://localhost:3100"
          requirement: "required"
        HYPERSWITCH_REPO_PATH:
          description: "Absolute path to the local Hyperswitch git checkout. The runner `cd`s into the per-issue worktree at `${HYPERSWITCH_REPO_PATH}/cypress-tests-<issue-identifier>/cypress-tests` to execute Cypress. Defaults to `/workspace/hyperswitch` in the hosted runner; override when running locally."
          kind: "string"
          default: "/workspace/hyperswitch"
          requirement: "required"
        CYPRESS_CONNECTOR_AUTH_FILE_PATH:
          description: "Absolute path to the Cypress connector credentials file (`creds.json`). Exported verbatim into the Cypress run environment so the suite can read connector keys. Defaults to `/workspace/creds.json` in the hosted runner; override when running locally if the file lives elsewhere."
          kind: "string"
          default: "/workspace/creds.json"
          requirement: "required"
        CYPRESS_BASEURL:
          description: "Fully-qualified base URL of the Hyperswitch router under test. Used by the health check (`${CYPRESS_BASEURL}/health/ready`) and exported into every `npx cypress run` invocation. Defaults to `http://hyperswitch-hyperswitch-server-1:8080` in the hosted compose stack; set to `http://localhost:8080` (or wherever the router listens) when running locally. Distinct from `$PAPERCLIP_BASE_URL`."
          kind: "string"
          default: "http://hyperswitch-hyperswitch-server-1:8080"
          requirement: "required"
  test-generation-agent:
    role: "engineer"
    icon: "code"
    capabilities: "Process 4 — Three modes: (A) initial generation of Cypress specs following the exact repo structure after feasibility checks pass; (B) targeted revisions to an existing spec in response to reviewer comments on an open PR; (C) merge-conflict resolution — merges origin/main into the worktree branch and resolves conflicts using Cypress-specific heuristics (spec additions, commands.js, globalState, fixtures), escalating to the CEO for unknown conflict shapes. Uses verified commands.js functions, globalState for IDs, should\\_continue\\_further() gates, and covers happy path, negative, and edge cases."
    adapter:
      config:
        dangerouslySkipPermissions: true
        graceSec: 20
        model: "litellm/kimi-latest"
      type: "opencode_local"
    inputs:
      env:
        PAPERCLIP_BASE_URL:
          description: "Fully-qualified Paperclip control-plane base URL this agent reports to (e.g. `http://localhost:3100` for local — local Paperclip listens on port 3100; or `https://paperclip.example.com` for a hosted instance — use `https://` for any non-localhost host). Used in every POST/PATCH/GET against `${PAPERCLIP_BASE_URL}/api/...`."
          kind: "string"
          default: "http://localhost:3100"
          requirement: "required"
        HYPERSWITCH_REPO_PATH:
          description: "Absolute path to the local Hyperswitch git checkout. The agent writes/edits spec and config files inside the per-issue worktree at `${HYPERSWITCH_REPO_PATH}/cypress-tests-<issue-identifier>/cypress-tests`. Defaults to `/workspace/hyperswitch` in the hosted runner; override when running locally."
          kind: "string"
          default: "/workspace/hyperswitch"
          requirement: "required"
  validation-agent:
    role: "engineer"
    icon: "shield"
    capabilities: "Process 1 — Validates features and bugs against the feature matrix using the Deepwiki MCP before any test work begins. Reports BLOCKED immediately if the feature is not in scope."
    adapter:
      config:
        dangerouslySkipPermissions: true
        graceSec: 20
        model: "litellm/kimi-latest"
      type: "opencode_local"
    inputs:
      env:
        PAPERCLIP_BASE_URL:
          description: "Fully-qualified Paperclip control-plane base URL this agent reports to (e.g. `http://localhost:3100` for local — local Paperclip listens on port 3100; or `https://paperclip.example.com` for a hosted instance — use `https://` for any non-localhost host). Used in every POST/PATCH against `${PAPERCLIP_BASE_URL}/api/...` when reporting the VALIDATED / BLOCKED verdict."
          kind: "string"
          default: "http://localhost:3100"
          requirement: "required"
        CYPRESS_BASEURL:
          description: "Fully-qualified base URL of the Hyperswitch router used for the live `feature_matrix` query in Process 1. Defaults to `http://hyperswitch-hyperswitch-server-1:8080` in the hosted compose stack; set to `http://localhost:8080` (or wherever the router listens) when running locally. Distinct from `$PAPERCLIP_BASE_URL`."
          kind: "string"
          default: "http://hyperswitch-hyperswitch-server-1:8080"
          requirement: "required"
company:
  requireBoardApprovalForNewAgents: false
projects:
  hyperswitch:
    color: "#8b5cf6"
    status: "planned"
    workspaces:
      hyperswitch:
        name: "hyperswitch"
        defaultRef: "main"
        isPrimary: true
        repoRef: "qa/QAA-38-clean"
        repoUrl: "https://github.com/juspay/hyperswitch/tree/main/cypress-tests"
        sourceType: "git_repo"
        visibility: "default"
  onboarding:
    color: "#6366f1"
    status: "completed"
sidebar:
  agents:
    - "qa-coverage-agent"
    - "api-testing-agent"
    - "cypress-feasibility-agent"
    - "github-agent"
    - "pr-maintenance-agent"
    - "runner-agent"
    - "test-generation-agent"
    - "validation-agent"
  projects:
    - "hyperswitch"
